<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLANORA</title>
<!-- CSS -->
<link rel="stylesheet" href="plan style.css">
<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
<div class="container">
<div id="login-screen" class="screen active">
<div class="welcome">
<i class="fa-solid fa-layer-group"
style="font-size:5rem;color:#7f5af0;margin-bottom:20px;"></i>
<h1>PLANORA</h1>
<p style="margin:15px 0;color:#ccc;">
Plan. Organize. Achieve.
</p>
<input type="email"
id="email"
placeholder="Enter Email">
<input type="password"
id="password"
placeholder="Enter Password">
<button class="main-btn"
onclick="login()">
Login
</button>
</div>
</div>
<div id="home-screen" class="screen">
<header>
<button class="icon-btn"
onclick="openDiary()">
<i class="fa-solid fa-lock"></i>
</button>
<div>
<h3 id="welcomeUser">Welcome</h3>
<p id="clock"></p>
</div>
<button class="icon-btn"
onclick="toggleTheme()">
<i class="fa-solid fa-moon"></i>
</button>
</header>
<div class="weather-box" id="weather">
Loading weather...
</div>
<div class="quote" id="quote">
Loading motivational quote...
</div>
<input type="text"
id="searchTask"
placeholder="Search Tasks..."
onkeyup="searchTasks()">
<div class="stats">
<div class="stat-box">
<h4 id="totalTasks">0</h4>
<p>Total</p>
</div>
<div class="stat-box">
<h4 id="completedTasks">0</h4>
<p>Done</p>
</div>
</div>
<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
<br>
<div class="todo-container"
id="todo-list"></div>
<button class="fab"
onclick="addTask()">
<i class="fa-solid fa-plus"></i>
</button>
</div>
<div id="diary-screen"
class="screen">
<header>
<button class="icon-btn"
onclick="showScreen('home-screen')">
<i class="fa-solid fa-arrow-left"></i>
</button>
<h3>Private Diary</h3>
<button class="icon-btn"
onclick="newDiaryEntry()">
<i class="fa-solid fa-pen"></i>
</button>
</header>
<div id="diary-list"></div>
</div>
<div id="editor-screen"
class="screen">
<header>
<button class="icon-btn"
onclick="showScreen('diary-screen')">
<i class="fa-solid fa-xmark"></i>
</button>
<h3 id="editorDate"></h3>
<button class="icon-btn"
onclick="saveDiary()">
<i class="fa-solid fa-floppy-disk"></i>
</button>
</header>
<textarea id="diaryText"
placeholder="Write your secret thoughts...">
</textarea>
</div>
</div>
<script src="plan js.js"></script>
</body>
</html>
